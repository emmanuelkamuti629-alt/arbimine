<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARBIMINE – Verified Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/ccxt@4.2.0/dist/ccxt.browser.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --gold: #FFD700;
            --gold-gradient: linear-gradient(135deg, #FFD700, #B8860B);
            --dark-bg: #05070a;
            --card-bg: #111420;
            --green: #00ff88;
            --text-gray: #888ba0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--dark-bg); color: white; min-height: 100vh; }

        /* --- LOGIN PAGE --- */
        #loginPage { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .auth-card { display: flex; width: 100%; max-width: 950px; height: 580px; background: #0f111a; border-radius: 32px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        .visual-side { flex: 1.1; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1639762681485-074b7f938ba0?auto=format&fit=crop&q=80'); background-size: cover; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .form-side { flex: 0.9; padding: 50px; background: #121521; display: flex; flex-direction: column; justify-content: center; }
        .logo-svg { width: 280px; margin-bottom: 10px; }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 18px; color: var(--gold); width: 18px; }
        .input-group input { width: 100%; padding: 18px 18px 18px 48px; background: #0a0c14; border: 1px solid #2a2d3e; border-radius: 12px; color: white; font-size: 15px; transition: 0.3s; }
        .input-group input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 15px rgba(255,215,0,0.1); }
        .btn-gold { background: var(--gold-gradient); border: none; padding: 18px; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        /* --- DASHBOARD --- */
        #dashboard { display: none; }
        .dash-header { padding: 20px 25px; background: #0f111a; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #232635; position: sticky; top: 0; z-index: 100; }
        .status-strip { background: #0a0c14; padding: 12px 25px; font-size: 12px; color: var(--text-gray); display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #1a1d2e; }
        .pulse { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse-anim 2s infinite; }
        
        .main-container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .opp-card { background: var(--card-bg); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid #232635; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .opp-card.verified { border-color: var(--green); background: rgba(0, 255, 136, 0.03); }
        .v-badge { position: absolute; top: 0; right: 0; font-size: 10px; padding: 5px 12px; border-bottom-left-radius: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; background: #1a1d2e; color: #555; }
        .v-badge.active { background: var(--green); color: #000; }

        .coin-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .net-profit { font-size: 30px; font-weight: 900; color: var(--green); }
        .price-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .fee-note { font-size: 10px; color: #555; margin-top: 5px; }

        @keyframes pulse-anim { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="auth-card">
            <div class="visual-side">
                <svg class="logo-svg" viewBox="0 0 400 180">
                    <path d="M120 140 L180 40 L240 140" fill="none" stroke="white" stroke-width="12" stroke-linecap="round"/>
                    <path d="M140 120 Q190 70 260 60" fill="none" stroke="#FFD700" stroke-width="10" stroke-linecap="round"/>
                    <text x="65" y="170" font-family="Arial" font-size="48" font-weight="900" fill="white">ARBIMINE</text>
                </svg>
                <div style="color:var(--gold); letter-spacing:4px; font-size:11px; font-weight:bold">FIND · ANALYZE · PROFIT</div>
            </div>
            <div class="form-side">
                <h2 style="margin-bottom:10px">Secure Terminal</h2>
                <p style="color:var(--text-gray); font-size:14px; margin-bottom:30px">Connect to 10 Global Exchanges</p>
                <div class="input-group"><i data-lucide="phone"></i><input type="tel" id="loginPhone" placeholder="Phone Number"></div>
                <div class="input-group"><i data-lucide="lock"></i><input type="password" id="loginPass" placeholder="Password"></div>
                <button class="btn-gold" id="startBtn">Unlock Scanner</button>
            </div>
        </div>
    </div>

    <div id="dashboard">
        <header class="dash-header">
            <h2 style="color:var(--gold); letter-spacing:1px">⚡ ARBIMINE</h2>
            <div style="background:var(--gold); color:black; padding:5px 15px; border-radius:50px; font-size:10px; font-weight:900">PRO MODE</div>
        </header>
        <div class="status-strip">
            <div class="pulse"></div>
            <span id="loadMsg">Connecting to UltraCore Proxy...</span>
        </div>
        <div class="main-container" id="oppDisplay">
            </div>
    </div>

    <script>
        lucide.createIcons();

        // 1. ADVANCED CONFIGURATION
        const CONFIG = {
            exchanges: ['binance', 'kucoin', 'bybit', 'okx', 'gateio', 'mexc', 'bitget', 'kraken', 'htx', 'huobi'],
            // PRO TIP FIX: Replace this with your personal Railway/Render proxy URL
            proxy: "https://cors-anywhere.herokuapp.com/", 
            symbols: ['BTC/USDT', 'ETH/USDT', 'SOL/USDT', 'XRP/USDT', 'ADA/USDT', 'BNB/USDT'],
            minProfit: 0.8, // 0.8% minimum after fees
            feeRate: 0.002, // 0.2% total estimated fee (Buy + Sell + Gas)
            verifyDelay: 120000 // 2 minutes
        };

        const exInstances = CONFIG.exchanges.map(id => new ccxt[id]({ proxyUrl: CONFIG.proxy, timeout: 15000 }));
        let liveTracker = {};

        document.getElementById('startBtn').onclick = () => {
            const p = document.getElementById('loginPhone').value;
            if(p.length >= 8) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                runEngine();
                setInterval(runEngine, 45000); 
            }
        };

        // 2. THE SEQUENTIAL SCANNER (Throttled for Efficiency)
        async function runEngine() {
            const msg = document.getElementById('loadMsg');
            msg.innerText = "Scanning exchanges sequentially to prevent IP blocks...";
            
            const results = {};

            for (const ex of exInstances) {
                try {
                    // Small throttle delay between exchanges
                    await new Promise(r => setTimeout(r, 300));
                    results[ex.id] = await ex.fetchTickers(CONFIG.symbols);
                } catch (e) { console.warn(`Skipping ${ex.id}`); }
            }

            CONFIG.symbols.forEach(sym => {
                let pData = [];
                CONFIG.exchanges.forEach(id => {
                    if (results[id] && results[id][sym]) {
                        pData.push({ id, last: results[id][sym].last });
                    }
                });

                if (pData.length > 1) {
                    pData.sort((a, b) => a.last - b.last);
                    const buy = pData[0];
                    const sell = pData[pData.length - 1];
                    
                    // Fee-Adjusted Profit Calculation
                    const rawSpread = ((sell.last - buy.last) / buy.last);
                    const netProfit = ((rawSpread - CONFIG.feeRate) * 100).toFixed(2);

                    if (netProfit > CONFIG.minProfit) {
                        const key = `${sym}-${buy.id}-${sell.id}`;
                        if (!liveTracker[key]) {
                            liveTracker[key] = {
                                sym, buy: buy.id, sell: sell.id,
                                bP: buy.last, sP: sell.last,
                                profit: netProfit,
                                status: 'WAITING',
                                born: Date.now()
                            };
                            queueVerification(key);
                        }
                    }
                }
            });
            updateUI();
        }

        // 3. 2-MINUTE VERIFICATION LOGIC
        function queueVerification(key) {
            setTimeout(async () => {
                const item = liveTracker[key];
                if (!item) return;

                try {
                    const bTicker = await new ccxt[item.buy]({proxyUrl: CONFIG.proxy}).fetchTicker(item.sym);
                    const sTicker = await new ccxt[item.sell]({proxyUrl: CONFIG.proxy}).fetchTicker(item.sym);
                    
                    const spread = ((sTicker.last - bTicker.last) / bTicker.last);
                    const finalProfit = ((spread - CONFIG.feeRate) * 100).toFixed(2);

                    if (finalProfit > CONFIG.minProfit) {
                        item.status = 'VERIFIED';
                        item.profit = finalProfit;
                        item.bP = bTicker.last;
                        item.sP = sTicker.last;
                    } else {
                        delete liveTracker[key]; // Spread faded, remove from view
                    }
                    updateUI();
                } catch (e) { delete liveTracker[key]; }
            }, CONFIG.verifyDelay);
        }

        function updateUI() {
            const display = document.getElementById('oppDisplay');
            const sorted = Object.values(liveTracker).sort((a,b) => b.profit - a.profit);
            
            display.innerHTML = sorted.map(o => `
                <div class="opp-card ${o.status === 'VERIFIED' ? 'verified' : ''}">
                    <div class="v-badge ${o.status === 'VERIFIED' ? 'active' : ''}">
                        ${o.status === 'VERIFIED' ? 'Verified Opportunity' : 'Confirming Liquidity...'}
                    </div>
                    <div class="coin-row">
                        <div style="font-weight:800; font-size:20px; letter-spacing:1px">${o.sym.split('/')[0]}</div>
                        <div class="net-profit">${o.profit}%</div>
                    </div>
                    <div class="price-info">
                        <div>
                            <div style="font-size:10px; color:#555">BUY: ${o.buy.toUpperCase()}</div>
                            <div style="color:var(--gold); font-weight:bold">$${o.bP.toLocaleString()}</div>
                        </div>
                        <div style="text-align:right">
                            <div style="font-size:10px; color:#555">SELL: ${o.sell.toUpperCase()}</div>
                            <div style="color:var(--gold); font-weight:bold">$${o.sP.toLocaleString()}</div>
                        </div>
                    </div>
                    <div class="fee-note">Adjusted for ~0.2% exchange fees & slippage</div>
                </div>
            `).join('');

            document.getElementById('loadMsg').innerText = `Active Scans: ${sorted.length} | Top Spread: ${sorted[0]?.profit || 0}%`;
        }
    </script>
</body>
</html>
