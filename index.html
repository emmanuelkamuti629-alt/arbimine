<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ARBIMINE PRO | All-In-One</title>
    <style>
        :root { --gold: #FFD700; --bg: #0a0a1a; --card: #121521; --green: #10b981; --red: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; }

        /* --- AUTH PAGES --- */
        .page { display: none; min-height: 100vh; padding: 20px; }
        .active-page { display: flex; flex-direction: column; }
        .auth-container { margin: auto; width: 100%; max-width: 400px; text-align: center; background: rgba(30,30,60,0.5); padding: 30px; border-radius: 30px; border: 1px solid rgba(255,215,0,0.2); }
        h1 { font-size: 32px; color: var(--gold); margin-bottom: 10px; letter-spacing: 2px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 50px; border: 1px solid #2a2d3e; background: #050510; color: white; outline: none; }
        input:focus { border-color: var(--gold); }
        .btn { width: 100%; padding: 15px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); margin-top: 20px; }

        /* --- DASHBOARD --- */
        .header { background: var(--gold); color: black; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; font-weight: bold; }
        .stats-bar { display: flex; justify-content: space-around; background: #050510; padding: 15px; margin: 15px; border-radius: 20px; border: 1px solid #1a1a3a; }
        .stat-item { text-align: center; }
        .stat-val { color: var(--gold); font-size: 20px; font-weight: bold; }
        .stat-lbl { font-size: 10px; color: #888; }

        /* --- CARDS --- */
        .card { background: var(--card); margin: 0 15px 12px; padding: 18px; border-radius: 20px; border: 1px solid #1a1a3a; position: relative; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .profit { float: right; color: var(--green); font-size: 22px; font-weight: 900; }
        .coin-name { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .badge { font-size: 10px; padding: 4px 10px; border-radius: 10px; font-weight: bold; }
        .badge-buy { background: rgba(16,185,129,0.2); color: var(--green); }
        .badge-sell { background: rgba(239,68,68,0.2); color: var(--red); }

        /* --- NAV --- */
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #050510; border-top: 1px solid #1a1a3a; display: flex; align-items: center; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #555; cursor: pointer; }
        .nav-item.active { color: var(--gold); }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .m-content { width: 85%; background: #161632; padding: 30px; border-radius: 25px; border: 1px solid var(--gold); text-align: center; }
    </style>
</head>
<body>

    <div id="page-login" class="page active-page">
        <div class="auth-container">
            <h1>ARBIMINE</h1>
            <p style="font-size: 12px; color: #666; margin-bottom: 20px;">CRYPTO ARBITRAGE TERMINAL</p>
            <input type="tel" id="l-phone" placeholder="Phone Number">
            <input type="password" id="l-pass" placeholder="Password">
            <button class="btn btn-gold" onclick="handleLogin()">ACCESS SYSTEM</button>
            <button class="btn btn-outline" onclick="showPage('page-register')">CREATE NEW ACCOUNT</button>
        </div>
    </div>

    <div id="page-register" class="page">
        <div class="auth-container">
            <h1>REGISTER</h1>
            <p style="font-size: 12px; color: #666; margin-bottom: 20px;">JOIN THE NETWORK</p>
            <input type="text" id="r-name" placeholder="Full Name">
            <input type="tel" id="r-phone" placeholder="Phone Number">
            <input type="password" id="r-pass" placeholder="Create Password">
            <button class="btn btn-gold" onclick="handleRegister()">REGISTER NOW</button>
            <button class="btn btn-outline" onclick="showPage('page-login')">ALREADY HAVE ACCOUNT</button>
        </div>
    </div>

    <div id="page-dash" class="page">
        <div class="header">
            <span>🚀 ARBIMINE</span>
            <span id="user-tier" style="font-size: 12px; background:black; color:white; padding:4px 10px; border-radius:10px;">FREE</span>
        </div>

        <div class="stats-bar">
            <div class="stat-item"><div class="stat-val">24</div><div class="stat-lbl">EXCHANGES</div></div>
            <div class="stat-item"><div class="stat-val" id="opp-count">0</div><div class="stat-lbl">LIVE DEALS</div></div>
            <div class="stat-item"><div class="stat-val" style="color:var(--green)">Online</div><div class="stat-lbl">STATUS</div></div>
        </div>

        <div id="feed">
            <p style="text-align:center; padding:50px; color:#444;">Connecting to Global Markets...</p>
        </div>

        <nav class="nav">
            <div class="nav-item active">🏠<br>Market</div>
            <div class="nav-item" onclick="openModal()">⭐<br>Go Pro</div>
            <div class="nav-item" onclick="logout()">🚪<br>Logout</div>
        </nav>
    </div>

    <div id="payModal" class="modal">
        <div class="m-content">
            <h2 style="color:var(--gold)">Unlock Pro Access</h2>
            <p style="font-size: 13px; margin: 15px 0; color: #ccc;">See spreads above 2.0% and hidden coins.</p>
            <div style="background:#050510; padding:15px; border-radius:15px; border:1px solid #1a1a3a;">
                <p style="font-size:10px; color:#666;">M-Pesa Pochi KES 200:</p>
                <p style="font-size:20px; color:var(--gold); font-weight:bold;">0728 308602</p>
            </div>
            <button class="btn btn-gold" onclick="closeModal()">I HAVE SENT PAYMENT</button>
        </div>
    </div>

    <script>
        // --- DATA STORAGE & AUTH ---
        let users = JSON.parse(localStorage.getItem('arb_users') || '[]');
        let currentUser = JSON.parse(localStorage.getItem('arb_session') || 'null');

        if(currentUser) { showPage('page-dash'); startScanner(); }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
        }

        function handleRegister() {
            const name = document.getElementById('r-name').value;
            const phone = document.getElementById('r-phone').value;
            const pass = document.getElementById('r-pass').value;

            if(!name || !phone || !pass) return alert("Fill all fields");
            if(users.find(u => u.phone === phone)) return alert("Phone already exists");

            const newUser = { name, phone, pass, tier: 'free' };
            users.push(newUser);
            localStorage.setItem('arb_users', JSON.stringify(users));
            alert("Registration Successful! Please Login.");
            showPage('page-login');
        }

        function handleLogin() {
            const phone = document.getElementById('l-phone').value;
            const pass = document.getElementById('l-pass').value;

            const user = users.find(u => u.phone === phone && u.pass === pass);
            if(!user) return alert("Invalid credentials");

            currentUser = user;
            localStorage.setItem('arb_session', JSON.stringify(user));
            showPage('page-dash');
            startScanner();
        }

        function logout() {
            localStorage.removeItem('arb_session');
            location.reload();
        }

        // --- SCANNER ENGINE ---
        function startScanner() {
            document.getElementById('user-tier').innerText = currentUser.tier.toUpperCase();
            setInterval(generateDeals, 4000);
            generateDeals();
        }

        function generateDeals() {
            const coins = ['BTC/USDT', 'ETH/USDT', 'SOL/USDT', 'XRP/USDT', 'ADA/USDT', 'DOGE/USDT'];
            const ex = ['Binance', 'KuCoin', 'Bybit', 'Gate.io', 'MEXC'];
            const feed = document.getElementById('feed');
            let html = '';

            for(let i=0; i<4; i++) {
                const coin = coins[Math.floor(Math.random()*coins.length)];
                const buyEx = ex[Math.floor(Math.random()*ex.length)];
                let sellEx = ex[Math.floor(Math.random()*ex.length)];
                while(sellEx === buyEx) sellEx = ex[Math.floor(Math.random()*ex.length)];
                
                const profit = (Math.random() * 3.5).toFixed(2);
                const isLocked = profit > 2.0 && currentUser.tier === 'free';

                html += `
                    <div class="card" onclick="${isLocked ? 'openModal()' : ''}">
                        <span class="profit">${isLocked ? '🔒.🔒%' : profit + '%'}</span>
                        <div class="coin-name">${coin}</div>
                        <div style="margin-bottom:10px;">
                            <span class="badge badge-buy">BUY: ${buyEx}</span>
                            <span class="badge badge-sell">SELL: ${sellEx}</span>
                        </div>
                        <div style="font-size:10px; color:#444;">Last sync: ${new Date().toLocaleTimeString()}</div>
                    </div>
                `;
            }
            feed.innerHTML = html;
            document.getElementById('opp-count').innerText = Math.floor(Math.random() * 10) + 15;
        }

        // --- UI HELPERS ---
        function openModal() { document.getElementById('payModal').style.display = 'flex'; }
        function closeModal() { 
            document.getElementById('payModal').style.display = 'none'; 
            alert("Verification pending. Admin will approve within 30 mins.");
        }
    </script>
</body>
</html>
