<div id="customModal" style="display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(5px); align-items:center; justify-content:center;">
    <div style="background:#121521; border:1px solid #FFD700; border-radius:20px; padding:30px; width:90%; max-width:400px; text-align:center; box-shadow:0 0 30px rgba(255,215,0,0.2);">
        <i data-lucide="info" style="color:#FFD700; margin-bottom:15px; width:40px; height:40px;"></i>
        <h3 id="modalTitle" style="color:#fff; margin-bottom:10px; font-weight:800;">Notification</h3>
        <p id="modalBody" style="color:#888ba0; font-size:14px; line-height:1.5; margin-bottom:25px;"></p>
        <button onclick="closeCustomModal()" style="background:#FFD700; border:none; padding:12px 40px; border-radius:10px; color:#000; font-weight:900; cursor:pointer; width:100%;">OK</button>
    </div>
</div>

<script>
// 2. Updated JavaScript Functions to replace alert()
function showNotify(message) {
    document.getElementById('modalBody').innerText = message;
    document.getElementById('customModal').style.display = 'flex';
    lucide.createIcons(); // Ensure the icon renders
}

function closeCustomModal() {
    document.getElementById('customModal').style.display = 'none';
}

// 3. Update your button listeners to use showNotify instead of alert
// Example for the Login Page:
document.getElementById('loginSubmit').onclick = function() {
    const p = document.getElementById('pNumber').value;
    if(p.length >= 8) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        startScannerEngine();
    } else {
        showNotify("Please enter a valid phone number to continue.");
    }
};

// Example for Footer Links:
// Change: onclick="alert('LocalSignup Only')" 
// To: onclick="showNotify('Registration is currently limited to local users.')"
</script>
