<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ARBIMINE – Find. Analyze. Profit.</title>
    <script src="https://cdn.jsdelivr.net/npm/ccxt@4.2.0/dist/ccxt.browser.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #FFD700;
            --gold-gradient: linear-gradient(135deg, #FFD700, #B8860B, #BF9B30);
            --dark-deep: #05070a;
            --form-bg: #121521;
            --card-glass: rgba(22, 26, 46, 0.7);
            --green: #00ff88;
            --text-muted: #888ba0;
            --input-border: #2a2d3e;
            --input-bg: #0a0c14;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background-color: var(--dark-deep); color: white; min-height: 100vh; overflow-x: hidden; }

        /* --- 1. LOGIN PAGE (EXACT IMAGE RECONSTRUCTION) --- */
        #loginPage {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 50%, #111420 0%, #05070a 100%);
            padding: 20px;
        }

        .auth-container {
            display: flex;
            width: 100%;
            max-width: 980px;
            height: 620px; /* Matching image aspect */
            background: #0f111a;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
        }

        /* Left Side: Visual Branding */
        .auth-visual {
            flex: 1.1;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1640340434855-6084b1f4901c?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            border-right: 1px solid rgba(255,255,255,0.03);
        }

        /* SVG Branding assets matching image precisely */
        .logo-main { width: 300px; filter: drop-shadow(0 0 20px rgba(255,215,0,0.3)); }
        .tagline { margin-top: 15px; letter-spacing: 5px; color: var(--gold); font-size: 11px; font-weight: 800; opacity: 0.9; text-transform: uppercase;}

        /* Right Side: Form Side */
        .auth-form-side {
            flex: 0.9;
            padding: 60px 50px;
            background: #121521;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-header { text-align: center; margin-bottom: 35px; }
        .auth-header h2 { font-size: 32px; font-weight: 700; margin-bottom: 8px; color: #fff; }
        .auth-header p { color: var(--text-muted); font-size: 14px; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--gold); width: 18px; }
        .input-group input {
            width: 100%;
            padding: 18px 16px 18px 48px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }
        .input-group input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(255,215,0,0.1); outline: none; }

        .btn-prime {
            width: 100%;
            padding: 20px;
            background: var(--gold-gradient);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        .btn-prime:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(218, 165, 32, 0.4); }

        .auth-footer { text-align: center; margin-top: 30px; }
        .auth-footer .divider { color: var(--text-muted); font-size: 12px; margin-bottom: 25px; position: relative; display: block; }
        .auth-footer .divider::before, .auth-footer .divider::after {
            content: ""; position: absolute; top: 50%; width: 40%; height: 1px; background: rgba(255,255,255,0.05);
        }
        .auth-footer .divider::before { left: 0; } .auth-footer .divider::after { right: 0; }
        .auth-footer a { display: block; color: var(--gold); text-decoration: none; font-size: 14px; margin-bottom: 15px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .auth-footer a:hover { opacity: 0.8; }

        /* --- 2. DASHBOARD SECTION --- */
        #dashboard { display: none; padding-bottom: 80px; }
        .dash-header {
            padding: 20px 25px;
            background: #0f111a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #232635;
            position: sticky; top: 0; z-index: 100;
        }
        .tier-pill { background: var(--gold); color: #000; padding: 5px 15px; border-radius: 50px; font-size: 11px; font-weight: 900; }

        .main-content { padding: 25px; max-width: 800px; margin: 0 auto; }
        .status-line { display: flex; align-items: center; gap: 10px; color: var(--text-muted); font-size: 12px; margin-bottom: 20px; }
        .pulse { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88; animation: pulse-anim 2s infinite; }

        /* Opportunity Cards */
        .opp-card {
            background: var(--card-glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            will-change: transform, opacity;
            position: relative;
        }
        .opp-card:hover { transform: scale(1.02) translateY(-5px); border-color: var(--gold); background: rgba(22, 26, 46, 0.9); }
        /* Automatic removal animation */
        .opp-card.removing { opacity: 0; transform: scale(0.9) translateY(20px); pointer-events: none; }

        .card-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .coin-name { font-size: 20px; font-weight: 900; letter-spacing: 1px; color: #fff; }
        .profit-percent { font-size: 30px; font-weight: 900; color: var(--green); text-shadow: 0 0 20px rgba(0,255,136,0.2); }
        .price-details { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .ex-tag { color: var(--text-muted); font-size: 11px; text-transform: uppercase; margin-bottom: 4px; }
        .ex-price { font-size: 16px; font-weight: 600; color: var(--gold); }

        /* Navigation Menu */
        .nav-menu {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(15, 17, 26, 0.95);
            backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #232635; z-index: 1000;
        }
        .nav-link { color: var(--text-muted); text-decoration: none; font-size: 12px; text-align: center; cursor: pointer; }
        .nav-link.active { color: var(--gold); font-weight: 600; }
        .nav-link span { display: block; margin-top: 5px; }

        /* Skeleton States while loading */
        .skeleton { height: 140px; background: #161a2e; border-radius: 20px; margin-bottom: 20px; animation: shine 1.5s infinite; }
        @keyframes shine { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        @keyframes pulse-anim { 0% { opacity: 0.5; } 70% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Responsive Mobile Layout similar to image */
        @media (max-width: 800px) {
            .auth-container { flex-direction: column; height: auto; border-radius: 0; }
            .auth-visual { padding: 40px 20px; min-height: 250px; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.03); }
            .auth-form-side { padding: 40px 25px; }
            .logo-main { width: 220px; }
        }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="auth-container">
            <div class="auth-visual">
                <svg class="logo-main" viewBox="0 0 400 200">
                    <defs>
                        <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#FFD700" />
                            <stop offset="100%" style="stop-color:#BF9B30" />
                        </linearGradient>
                    </defs>
                    <path d="M120 150 L180 40 L240 150" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round"/>
                    <path d="M140 130 Q190 70 260 60" fill="none" stroke="url(#mainGrad)" stroke-width="10" stroke-linecap="round"/>
                    <path d="M250 50 L270 60 L255 75" fill="url(#mainGrad)"/>
                    <text x="60" y="190" font-family="Arial" font-size="52" font-weight="900" fill="#FFFFFF">ARBIMINE</text>
                </svg>
                <div class="tagline">FIND. ANALYZE. PROFIT.</div>
            </div>

            <div class="auth-form-side">
                <div class="auth-header">
                    <h2>Welcome Back!</h2>
                    <p>Log in to continue to your account</p>
                </div>

                <div class="input-group">
                    <i data-lucide="phone"></i>
                    <input type="tel" id="pNumber" placeholder="Phone Number">
                </div>

                <div class="input-group">
                    <i data-lucide="lock"></i>
                    <input type="password" id="pLock" placeholder="Password">
                </div>

                <button class="btn-prime" id="loginSubmit">LOG IN</button>

                <div class="auth-footer">
                    <span class="divider">or</span>
                    <a onclick="alert(' Signup Disabled Locally')"><i data-lucide="user-plus" style="width:14px; vertical-align:middle; margin-right:5px"></i> Create Account</a>
                    <a onclick="alert('Contact Admin')"><i data-lucide="alert-triangle" style="width:14px; vertical-align:middle; margin-right:5px"></i> Forgot Password?</a>
                </div>
                
                <p style="color:#333; font-size: 10px; text-align: center; margin-top: 25px;">© 2025 Arbimine. Multi-Exchange Core Engine.</p>
            </div>
        </div>
    </div>

    <div id="dashboard">
        <header class="dash-header">
            <h2 style="color:var(--gold); font-weight:900">⚡ ARBIMINE</h2>
            <div class="tier-pill">PRO ACCESS</div>
        </header>

        <main class="main-content">
            <div class="status-line">
                <div class="pulse"></div>
                <span id="marketMsg">Syncing Multi-Exchange Data...</span>
            </div>

            <div id="scannerContainer">
                <div class="skeleton"></div>
                <div class="skeleton"></div>
            </div>
        </main>

        <nav class="nav-menu">
            <div class="nav-link active" onclick="location.reload()"><i data-lucide="layout-grid"></i><span>Scanner</span></div>
            <div class="nav-link"><i data-lucide="zap"></i><span>Verified</span></div>
            <div class="nav-link"><i data-lucide="shield-check"></i><span>Security</span></div>
            <div class="nav-link"><i data-lucide="user-circle"></i><span>Profile</span></div>
        </nav>
    </div>

    <script>
        // 1. Initialize Modern Icons
        lucide.createIcons();

        // 2. Scanner Configuration
        const ENGINE_CONFIG = {
            proxy: "https://cors-anywhere.herokuapp.com/", // Required for direct browser access to exchanges
            symbols: ['BTC/USDT', 'ETH/USDT', 'SOL/USDT', 'XRP/USDT', 'BNB/USDT', 'ADA/USDT'],
            minProfit: 0.05, // Threshold to show a difference for demo efficiency
            refresh: 15000 // Scan every 15 seconds
        };

        const binance = new ccxt.binance({ proxyUrl: ENGINE_CONFIG.proxy });
        const kucoin = new ccxt.kucoin({ proxyUrl: ENGINE_CONFIG.proxy });

        let currentKnownOpps = {}; // Store known opportunities for auto-deletion comparison

        // 3. Auth Flow
        document.getElementById('loginSubmit').onclick = function() {
            const p = document.getElementById('pNumber').value;
            // Simple validation for demo
            if(p.length >= 8) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                // Initialize modern icons again for new context
                lucide.createIcons();
                startScannerEngine();
            } else {
                alert("Enter a valid phone number");
            }
        };

        // 4. Multi-Exchange Scanner Engine with Auto-Deletion
        async function startScannerEngine() {
            const container = document.getElementById('scannerContainer');
            const msg = document.getElementById('marketMsg');

            async function scan() {
                msg.innerText = "Synchronizing Binance & KuCoin Liquidity Pools...";
                
                try {
                    // Fetch all tickers in parallel for speed
                    const [binTickers, kuTickers] = await Promise.all([
                        binance.fetchTickers(ENGINE_CONFIG.symbols),
                        kucoin.fetchTickers(ENGINE_CONFIG.symbols)
                    ]);

                    const foundThisScan = new Set(); // Track pairs live right now

                    ENGINE_CONFIG.symbols.forEach(symbol => {
                        const b = binTickers[symbol].last;
                        const k = kuTickers[symbol].last;
                        const spread = Math.abs(b - k);
                        const pct = ((spread / Math.min(b, k)) * 100).toFixed(2);

                        if(pct > ENGINE_CONFIG.minProfit) {
                            foundThisScan.add(symbol); // Track it as live
                            
                            if (!currentKnownOpps[symbol]) {
                                // If it's a new opportunity, add to DOM and store
                                currentKnownOpps[symbol] = true;
                                renderNewCard(symbol, pct, b, k);
                            } else {
                                // If existing, update values
                                updateLiveCard(symbol, pct, b, k);
                            }
                        }
                    });

                    // efficiency: Check if stored opportunities are still live
                    Object.keys(currentKnownOpps).forEach(symbol => {
                        if (!foundThisScan.has(symbol)) {
                            // If it doesn't exist in the current scan results, remove it from view
                            delete currentKnownOpps[symbol];
                            triggerAutoDeletion(symbol);
                        }
                    });

                    msg.innerText = `Markets Synchronized • ${new Date().toLocaleTimeString()}`;
                    
                    // Clear skeletons after first successful fetch
                    const skeletons = container.querySelectorAll('.skeleton');
                    if (skeletons.length > 0) skeletons.forEach(s => s.remove());

                } catch (e) {
                    console.error(e);
                    msg.innerText = "Error syncing markets. Retrying in 20s...";
                    msg.style.color = "#ff4444";
                }
            }

            // Initial call and set interval
            scan();
            setInterval(scan, ENGINE_CONFIG.refresh);
        }

        // 5. DOM Manipulation with Efficiency and Auto-Deletion
        function renderNewCard(sym, pct, bP, kP) {
            const container = document.getElementById('scannerContainer');
            const cardId = `opp-${sym.replace('/','-')}`;
            
            const cardHtml = `
                <div class="opp-card" id="${cardId}">
                    <div class="card-flex">
                        <div class="coin-name">${sym.split('/')[0]} <span style="color:var(--text-muted); font-size:14px">/ USDT</span></div>
                        <div class="profit-percent">${pct}%</div>
                    </div>
                    <div class="price-details">
                        <div>
                            <div class="ex-tag">BUY: BINANCE</div>
                            <div class="ex-price">$${bP.toLocaleString()}</div>
                        </div>
                        <div style="text-align:right">
                            <div class="ex-tag">SELL: KUCOIN</div>
                            <div class="ex-price">$${kP.toLocaleString()}</div>
                        </div>
                    </div>
                </div>
            `;
            
            // Insert at top for visibility
            container.insertAdjacentHTML('afterbegin', cardHtml);
        }

        function updateLiveCard(sym, pct, bP, kP) {
            const cardId = `opp-${sym.replace('/','-')}`;
            const card = document.getElementById(cardId);
            if (!card) return;

            card.querySelector('.profit-percent').innerText = `${pct}%`;
            card.querySelectorAll('.ex-price')[0].innerText = `$${bP.toLocaleString()}`;
            card.querySelectorAll('.ex-price')[1].innerText = `$${kP.toLocaleString()}`;
        }

        function triggerAutoDeletion(sym) {
            const cardId = `opp-${sym.replace('/','-')}`;
            const card = document.getElementById(cardId);
            if (!card) return;

            // Add removing class to trigger CSS animation
            card.classList.add('removing');
            
            // efficiency: Wait for animation, then remove from DOM completely
            setTimeout(() => {
                if (card) card.remove();
            }, 500); 
        }
    </script>
</body>
</html>
