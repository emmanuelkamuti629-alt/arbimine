<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARBIMINE PRO</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root { --gold:#FFD700; --dark:#05070a; --glass:#121521; }

body { margin:0; font-family:Arial; background:var(--dark); color:white; }

/* LOGIN */
#loginPage { display:flex; height:100vh; flex-direction:column; justify-content:center; padding:20px;}
.input-box { padding:15px; margin:10px 0; border-radius:10px; border:none; background:#111; color:white;}
.login-btn { padding:15px; background:var(--gold); border:none; border-radius:10px; font-weight:bold; }

/* DASHBOARD */
#dashboard { display:none; padding:20px; }
.card {
    background:var(--glass);
    border:1px solid #222;
    padding:15px;
    margin-bottom:10px;
    border-radius:12px;
}
.green { color:#00ff99; }
.red { color:#ff4d4d; }

/* MODAL */
#modal {
    display:none;
    position:fixed;
    width:100%; height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}
.modal-box {
    background:#111;
    padding:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
    <h1>ARBIMINE</h1>
    <input id="phone" class="input-box" placeholder="Phone">
    <input id="pass" type="password" class="input-box" placeholder="Password">
    <button class="login-btn" onclick="login()">LOGIN</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <h2>Live Arbitrage Scanner</h2>
    <div id="data"></div>
</div>

<!-- MODAL -->
<div id="modal">
    <div class="modal-box">
        <p id="msg"></p>
        <button onclick="closeModal()">OK</button>
    </div>
</div>

<script>
lucide.createIcons();

/* MODAL */
function showMsg(m){
    document.getElementById('msg').innerText=m;
    document.getElementById('modal').style.display='flex';
}
function closeModal(){
    document.getElementById('modal').style.display='none';
}

/* LOGIN (DEMO) */
function login(){
    const p=document.getElementById('phone').value;
    const pass=document.getElementById('pass').value;

    if(p.length<8 || pass.length<4){
        showMsg("Invalid login");
        return;
    }

    document.getElementById('loginPage').style.display='none';
    document.getElementById('dashboard').style.display='block';

    loadData();
}

/* FETCH MULTI-EXCHANGE */
async function fetchAll(){

    const [binance, kucoin, bybit, okx] = await Promise.all([
        fetch('https://api.binance.com/api/v3/ticker/price').then(r=>r.json()),
        fetch('https://api.kucoin.com/api/v1/market/allTickers').then(r=>r.json()),
        fetch('https://api.bybit.com/v2/public/tickers').then(r=>r.json()),
        fetch('https://www.okx.com/api/v5/market/tickers?instType=SPOT').then(r=>r.json())
    ]);

    let list=[];

    binance.forEach(c=>{
        list.push({symbol:c.symbol, price:+c.price, ex:"Binance"});
    });

    kucoin.data.ticker.forEach(c=>{
        list.push({symbol:c.symbol.replace('-',''), price:+c.last, ex:"KuCoin"});
    });

    bybit.result.forEach(c=>{
        list.push({symbol:c.symbol, price:+c.last_price, ex:"Bybit"});
    });

    okx.data.forEach(c=>{
        list.push({symbol:c.instId.replace('-',''), price:+c.last, ex:"OKX"});
    });

    return list;
}

/* ARBITRAGE */
function findArb(data){
    const map={};

    data.forEach(c=>{
        if(!map[c.symbol]) map[c.symbol]=[];
        map[c.symbol].push(c);
    });

    let ops=[];

    for(let s in map){
        let arr=map[s];
        if(arr.length<2) continue;

        arr.sort((a,b)=>a.price-b.price);

        let low=arr[0];
        let high=arr[arr.length-1];

        let diff=((high.price-low.price)/low.price)*100;

        if(diff>0.5){
            ops.push({
                symbol:s,
                buy:low,
                sell:high,
                profit:diff.toFixed(2)
            });
        }
    }

    return ops.slice(0,20);
}

/* LOAD DASHBOARD */
async function loadData(){
    try{
        const raw=await fetchAll();
        const ops=findArb(raw);

        let html="";

        ops.forEach(o=>{
            html+=`
            <div class="card">
                <b>${o.symbol}</b><br>
                Buy: ${o.buy.ex} @ ${o.buy.price}<br>
                Sell: ${o.sell.ex} @ ${o.sell.price}<br>
                Profit: <span class="green">${o.profit}%</span>
            </div>
            `;
        });

        if(!html) html="<p>No opportunities found</p>";

        document.getElementById('data').innerHTML=html;

    }catch(e){
        showMsg("Error loading market data");
    }
}

/* AUTO REFRESH */
setInterval(loadData, 5000);

</script>
</body>
</html>
