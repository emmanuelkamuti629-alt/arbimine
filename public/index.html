<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArbiMine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #070b1a; color: #eef2ff; font-family: Inter, sans-serif; }
    .glass { background: rgba(255,255,255,.05); backdrop-filter: blur(18px); border: 1px solid rgba(255,255,255,.08); border-radius: 20px; }
    .btn { background: linear-gradient(135deg, #22c55e, #16a34a); padding: 10px 18px; border-radius: 16px; font-weight: 600; border: none; color: white; cursor: pointer; }
    .tab-btn { padding: 10px 20px; border-radius: 20px; background: #1e293b; }
    .tab-btn.active { background: #22c55e; color: #0a0c15; }
    .hidden { display: none !important; }
    .opp-card { padding: 16px; margin-bottom: 12px; }
    .chat-msg { padding: 8px 12px; border-radius: 16px; margin: 4px 0; max-width: 80%; }
    .chat-user { background: #0f172a; margin-left: auto; }
    .chat-admin { background: #1a2a5a; }
  </style>
</head>
<body class="p-4">
  <div id="authDiv" class="max-w-md mx-auto mt-20 glass p-6">
    <h2 class="text-2xl font-bold text-center mb-4 text-green-400">ArbiMine</h2>
    <input id="email" placeholder="Email" class="w-full p-3 mb-2 rounded-xl bg-slate-800 border border-slate-700">
    <input id="password" type="password" placeholder="Password" class="w-full p-3 mb-2 rounded-xl bg-slate-800 border border-slate-700">
    <input id="username" placeholder="Username" class="w-full p-3 mb-2 rounded-xl bg-slate-800 border border-slate-700">
    <input id="mpesa" placeholder="M-Pesa 07..." class="w-full p-3 mb-4 rounded-xl bg-slate-800 border border-slate-700">
    <button onclick="register()" class="btn w-full mb-2">Register</button>
    <button onclick="login()" class="btn w-full bg-slate-700">Login</button>
  </div>

  <div id="appDiv" class="hidden">
    <div class="flex gap-2 mb-4 justify-center flex-wrap">
      <button class="tab-btn active" onclick="showTab('home')">Home</button>
      <button class="tab-btn" onclick="showTab('pro')">Pro</button>
      <button class="tab-btn" onclick="showTab('profile')">Profile</button>
      <button class="tab-btn" onclick="showTab('help')">Help</button>
      <button class="tab-btn bg-red-900" onclick="logout()">Logout</button>
    </div>
    <div id="home-tab"><div id="opportunities" class="text-center text-slate-400">Loading opportunities...</div></div>
    <div id="pro-tab" class="hidden glass p-6">
      <h3 class="text-xl font-bold mb-4">Upgrade to Pro</h3>
      <button class="btn w-full mb-2" onclick="subscribe('weekly')">Weekly KES 100</button>
      <button class="btn w-full" onclick="subscribe('monthly')">Monthly KES 350</button>
    </div>
    <div id="profile-tab" class="hidden glass p-6">
      <p><b>Username:</b> <span id="p-username"></span></p>
      <p><b>Tier:</b> <span id="p-tier"></span></p>
      <p class="mt-3"><b>Referral Link:</b></p>
      <div class="flex gap-2 mt-2">
        <input id="ref-link" readonly class="flex-1 p-2 rounded bg-slate-800 text-sm">
        <button class="btn" onclick="copyRef()">Copy</button>
      </div>
      <span id="copied" class="hidden text-green-400 text-sm">✓ Copied</span>
    </div>
    <div id="help-tab" class="hidden">
      <div id="chat-box" class="glass p-4 h-80 overflow-y-auto mb-3 flex flex-col"></div>
      <div class="flex gap-2">
        <input id="msg-input" placeholder="Message admin..." class="flex-1 p-3 rounded-xl bg-slate-800">
        <button class="btn" onclick="sendMsg()">Send</button>
      </div>
    </div>
  </div>
<script src="/app.js"></script>
</body>
</html>
