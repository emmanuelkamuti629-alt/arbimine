<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ArbiMine Pro</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif; }
    body { background:#0b0e14; color:#e0e6ed; min-height:100vh; display:flex; justify-content:center; align-items:flex-start; padding:12px; }
    .app-container { max-width:480px; width:100%; background:#12161e; border-radius:28px; padding:18px 16px 80px; box-shadow:0 12px 48px rgba(0,0,0,0.8); position:relative; }

    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .brand { font-size:20px; font-weight:700; color:#f0f4fa; }
    .brand span { color:#39d98a; }
    .status-badge { display:flex; align-items:center; gap:6px; font-size:13px; color:#39d98a; background:#1a262f; padding:4px 12px 4px 8px; border-radius:30px; border:1px solid #2a3a44; }
    .status-dot { width:8px; height:8px; background:#39d98a; border-radius:50%; display:inline-block; animation:pulse-dot 1.6s infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    .logout-btn { background:transparent; border:1px solid #3a4a5a; color:#b0c4d8; padding:4px 14px; border-radius:20px; font-size:13px; cursor:pointer; transition:0.2s; }
    .logout-btn:hover { background:#2a3a4a; color:#fff; }

    .mpesa-section { background:#181f2a; border-radius:18px; padding:18px 16px; margin-bottom:16px; border:1px solid #26323f; }
    .mpesa-section label { display:block; font-size:14px; color:#b0c4d8; margin-bottom:4px; }
    .mpesa-section input { width:100%; background:#0f151e; border:1px solid #2a3a48; border-radius:30px; padding:10px 16px; color:#f0f6fe; font-size:15px; outline:none; }
    .mpesa-section input::placeholder { color:#5a6a7a; }
    .mpesa-note { font-size:13px; color:#7a8a9a; margin-top:6px; }

    .pro-plans { display:flex; flex-direction:column; gap:14px; margin-top:8px; }
    .plan-card { background:#181f2a; border-radius:18px; padding:18px 16px; border:1px solid #26323f; display:flex; justify-content:space-between; align-items:center; }
    .plan-info { display:flex; flex-direction:column; }
    .plan-price { font-size:22px; font-weight:700; color:#f0f6fe; }
    .plan-label { font-size:14px; color:#b0c4d8; }
    .subscribe-btn { background:#39d98a; border:none; color:#0b0e14; font-weight:700; padding:10px 20px; border-radius:30px; cursor:pointer; transition:0.2s; font-size:14px; min-width:100px; text-align:center; }
    .subscribe-btn:disabled { opacity:0.5; cursor:not-allowed; background:#2a3a48; color:#7a8a9a; }
    .subscribe-btn.loading { background:#f5a623; color:#0b0e14; }

    .error-msg { background:#2a1a1a; border:1px solid #f97373; color:#f97373; padding:8px 14px; border-radius:12px; font-size:13px; margin-top:10px; display:none; }

    .resume-banner { background:#1a2e2a; border:1px solid #39d98a; border-radius:14px; padding:12px 16px; margin-top:12px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
    .resume-banner p { color:#b8ccde; font-size:14px; margin:0; }
    .resume-banner .resume-btn { background:#39d98a; border:none; color:#0b0e14; font-weight:700; padding:6px 18px; border-radius:30px; cursor:pointer; }
    .resume-banner .cancel-btn { background:transparent; border:1px solid #5a6a7a; color:#b0c4d8; padding:6px 18px; border-radius:30px; cursor:pointer; }

    .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); max-width:480px; width:100%; background:#0f151e; padding:10px 8px 16px; border-top:1px solid #26323f; display:flex; justify-content:space-around; border-radius:28px 28px 0 0; box-shadow:0 -8px 24px rgba(0,0,0,0.6); flex-wrap:nowrap; overflow-x:auto; gap:2px; }
    .nav-item { background:transparent; border:none; color:#6a7a8a; font-size:10px; font-weight:500; display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; transition:0.2s; padding:4px 6px; border-radius:12px; white-space:nowrap; }
    .nav-item:hover { color:#b0c8e0; }
    .nav-item.active { color:#39d98a; }
    .nav-item .nav-icon { font-size:16px; line-height:1; }
    .nav-item.refresh-tab { color:#f5a623; }
    .nav-item.refresh-tab:hover { color:#ffc107; }

    @media (max-width:420px) { .app-container { padding:12px 10px 70px; } .plan-card { flex-direction:column; align-items:stretch; gap:10px; } .subscribe-btn { width:100%; } }
  </style>
</head>
<body>

<div class="app-container">

  <!-- HEADER -->
  <div class="header">
    <div class="brand">ArbiMine <span>Pro</span></div>
    <div class="status-badge"><span class="status-dot"></span> Online</div>
    <button class="logout-btn">Logout</button>
  </div>

  <!-- M-Pesa & Redirect Note -->
  <div class="mpesa-section">
    <label>M-Pesa Phone Number (optional)</label>
    <input type="text" id="mpesaInput" placeholder="e.g., 254712345678" />
    <div class="mpesa-note">You’ll be redirected to Paystack to complete payment.</div>
  </div>

  <!-- Pro Plans -->
  <div class="pro-plans">
    <div class="plan-card">
      <div class="plan-info">
        <span class="plan-price">KES 261</span>
        <span class="plan-label">Weekly</span>
      </div>
      <button class="subscribe-btn" id="weeklyBtn" data-plan="weekly">Subscribe Weekly</button>
    </div>
    <div class="plan-card">
      <div class="plan-info">
        <span class="plan-price">KES 900</span>
        <span class="plan-label">Monthly</span>
      </div>
      <button class="subscribe-btn" id="monthlyBtn" data-plan="monthly">Subscribe Monthly</button>
    </div>
  </div>

  <!-- Error Message (exactly as in screenshot) -->
  <div class="error-msg" id="errorMsg">✖ Format is Authorization Bearer [secret key]</div>

  <!-- Resume Banner -->
  <div class="resume-banner" id="resumeBanner" style="display:none;">
    <p>⏳ Payment pending for <strong id="pendingPlanLabel">weekly</strong> plan.</p>
    <div>
      <button class="resume-btn" id="resumeBtn">Resume</button>
      <button class="cancel-btn" id="cancelBtn">Cancel</button>
    </div>
  </div>

  <!-- BOTTOM NAVIGATION -->
  <div class="bottom-nav">
    <button class="nav-item"><span class="nav-icon">🏠</span>Home</button>
    <button class="nav-item"><span class="nav-icon">📊</span>Arbitrage</button>
    <button class="nav-item"><span class="nav-icon">🏆</span>Top</button>
    <button class="nav-item"><span class="nav-icon">👁️</span>Watch</button>
    <button class="nav-item"><span class="nav-icon">🧮</span>Calc</button>
    <button class="nav-item active"><span class="nav-icon">⭐</span>Pro</button>
    <button class="nav-item"><span class="nav-icon">👤</span>Profile</button>
    <button class="nav-item"><span class="nav-icon">⚙️</span>Settings</button>
    <button class="nav-item refresh-tab" id="refreshProBtn"><span class="nav-icon">🔄</span>Refresh Pro</button>
    <button class="nav-item"><span class="nav-icon">❓</span>Help</button>
  </div>

</div>

<script>
  (function() {
    // DOM refs
    const weeklyBtn = document.getElementById('weeklyBtn');
    const monthlyBtn = document.getElementById('monthlyBtn');
    const resumeBanner = document.getElementById('resumeBanner');
    const pendingPlanLabel = document.getElementById('pendingPlanLabel');
    const resumeBtn = document.getElementById('resumeBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const refreshProBtn = document.getElementById('refreshProBtn');
    const errorMsg = document.getElementById('errorMsg');
    const mpesaInput = document.getElementById('mpesaInput');

    let activePlan = null; // 'weekly' or 'monthly' or null

    // UI updates
    function updateButtons() {
      weeklyBtn.textContent = (activePlan === 'weekly') ? 'Redirecting...' : 'Subscribe Weekly';
      monthlyBtn.textContent = (activePlan === 'monthly') ? 'Redirecting...' : 'Subscribe Monthly';
      weeklyBtn.classList.toggle('loading', activePlan === 'weekly');
      monthlyBtn.classList.toggle('loading', activePlan === 'monthly');
      weeklyBtn.disabled = (activePlan !== null);
      monthlyBtn.disabled = (activePlan !== null);
    }

    function updateBanner() {
      if (activePlan) {
        resumeBanner.style.display = 'flex';
        pendingPlanLabel.textContent = activePlan;
      } else {
        resumeBanner.style.display = 'none';
      }
    }

    function resetPaymentState() {
      activePlan = null;
      localStorage.removeItem('pendingPlan');
      updateButtons();
      updateBanner();
      errorMsg.style.display = 'none';
    }

    // Initiate payment – sends token in Authorization header
    async function initiatePayment(plan) {
      if (activePlan) return;

      const mpesa = mpesaInput.value.trim();
      errorMsg.style.display = 'none';

      activePlan = plan;
      localStorage.setItem('pendingPlan', plan);
      updateButtons();
      updateBanner();

      try {
        const token = localStorage.getItem('token') || '';
        const res = await fetch('/api/paystack/initialize', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`  // critical: must match backend expectation
          },
          body: JSON.stringify({ plan, mpesa })
        });

        const data = await res.json();

        if (!res.ok) {
          if (data.error && data.error.includes('Authorization')) {
            errorMsg.textContent = '✖ Format is Authorization Bearer [secret key]';
          } else {
            errorMsg.textContent = data.error || 'Payment initiation failed.';
          }
          errorMsg.style.display = 'block';
          resetPaymentState();
          return;
        }

        // Redirect to Paystack
        if (data.authorization_url) {
          window.location.href = data.authorization_url;
        } else {
          // fallback
          alert('✅ Payment initiated! Redirecting...');
          setTimeout(resetPaymentState, 3000);
        }

      } catch (err) {
        console.error('Payment error:', err);
        errorMsg.textContent = 'Network error. Please try again.';
        errorMsg.style.display = 'block';
        resetPaymentState();
      }
    }

    // Restore state on page load
    function restoreState() {
      const saved = localStorage.getItem('pendingPlan');
      if (saved === 'weekly' || saved === 'monthly') {
        activePlan = saved;
        updateButtons();
        updateBanner();
      } else {
        resetPaymentState();
      }
    }

    // Event listeners
    weeklyBtn.addEventListener('click', () => initiatePayment('weekly'));
    monthlyBtn.addEventListener('click', () => initiatePayment('monthly'));

    resumeBtn.addEventListener('click', () => {
      if (activePlan) {
        const plan = activePlan;
        resetPaymentState();
        initiatePayment(plan);
      }
    });

    cancelBtn.addEventListener('click', resetPaymentState);

    refreshProBtn.addEventListener('click', function() {
      resetPaymentState();
      alert('🔄 Pro page refreshed. Stuck "Redirecting" cleared.');
    });

    document.querySelector('.logout-btn').addEventListener('click', function() {
      if (confirm('Logout?')) {
        localStorage.removeItem('token');
        resetPaymentState();
        alert('Logged out.');
      }
    });

    // Check URL for payment status
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('payment') === 'success') {
      alert('✅ Payment successful! Your Pro plan is active.');
      window.history.replaceState({}, document.title, window.location.pathname);
    } else if (urlParams.get('payment') === 'failed') {
      errorMsg.textContent = '❌ Payment failed. Please try again.';
      errorMsg.style.display = 'block';
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    restoreState();
  })();
</script>
</body>
</html>
