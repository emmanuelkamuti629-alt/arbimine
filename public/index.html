<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ArbiMine Pro • Arbitrage Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ... (all styles as previously defined) ... */
    /* Smart Checklist specific styles */
    .checklist-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .checklist-item .label { color: #94a3b8; }
    .checklist-item .status { font-weight: 600; }
    .status-pass { color: #4ade80; }
    .status-fail { color: #ef4444; }
    .status-warn { color: #fbbf24; }
    /* Rest of styles as before... */
  </style>
</head>
<body>
<!-- ===== AUTH MODALS ===== -->
<!-- ===== HEADER ===== -->
<!-- ===== HOME PAGE ===== -->
<!-- ===== DETAIL PAGE ===== -->
<!-- ===== CHAT ===== -->
<!-- ===== PROFILE ===== -->
<!-- ===== FEATURES ===== -->
<!-- ===== TRADE HISTORY ===== -->
<!-- ===== SETTINGS ===== -->

<!-- ===== SMART TRADE CHECKLIST (inside Execute Trade tab) ===== -->
<!-- This is added within the #tab-execute div, after the existing fee rows -->
<div class="mt-6 card p-5 border border-slate-700 rounded-2xl bg-slate-950/50">
  <h2 class="text-2xl font-bold mb-4">📋 Smart Trade Checklist</h2>
  <div id="tradeChecklist" class="space-y-1">
    <div class="checklist-item">
      <span class="label">Spread Above Minimum (≥0.5%)</span>
      <span id="checkSpread" class="status status-pass">✔ PASS</span>
    </div>
    <div class="checklist-item">
      <span class="label">Enough Liquidity (≥$10,000)</span>
      <span id="checkLiquidity" class="status status-pass">✔ PASS</span>
    </div>
    <div class="checklist-item">
      <span class="label">Withdrawal Enabled (Buy)</span>
      <span id="checkWithdraw" class="status status-pass">✔ PASS</span>
    </div>
    <div class="checklist-item">
      <span class="label">Deposit Enabled (Sell)</span>
      <span id="checkDeposit" class="status status-pass">✔ PASS</span>
    </div>
    <div class="checklist-item">
      <span class="label">Matching Network (Tradable)</span>
      <span id="checkNetwork" class="status status-pass">✔ PASS</span>
    </div>
    <div class="checklist-item">
      <span class="label">Transfer Fee Acceptable (spread >1%)</span>
      <span id="checkFee" class="status status-pass">✔ PASS</span>
    </div>
    <div class="checklist-item">
      <span class="label">Market Volatility Safe</span>
      <span id="checkVolatility" class="status status-pass">✔ PASS</span>
    </div>
    <div class="checklist-item border-b-0 pt-2">
      <span class="label font-bold text-white">AI Recommendation</span>
      <span id="checkAI" class="status text-green-400 text-xl font-bold">READY TO TRADE</span>
    </div>
  </div>
</div>

<!-- ===== BOTTOM NAV (7 items) ===== -->
<!-- ===== TOAST ===== -->

<script>
  // ========== STATE ==========
  let token = localStorage.getItem('token');
  let allOpportunities = [];
  let chartInstances = {};
  let currentDetailOpp = null;
  let chatPollInterval = null;
  let selectedExchanges = new Set(['all']);

  // ========== FEATURES DATA ==========
  // ... (same as before) ...

  // ========== UI HELPERS ==========
  // ... (same as before) ...

  // ========== AUTH ==========
  // ... (same as before) ...

  // ========== PAGE SWITCH ==========
  // ... (same as before, with settings page added) ...

  // ========== OPPORTUNITIES ==========
  async function loadOpportunities() {
    const container = document.getElementById('opportunities');
    container.innerHTML = '<div class="loading-skeleton"></div><div class="loading-skeleton"></div>';
    try {
      const res = await fetch('/api/opportunities', { headers: { Authorization: token } });
      if (!res.ok) throw new Error('Failed to load');
      const data = await res.json();
      // If scanning and no opportunities, show scanning message and retry
      if (data.opportunities.length === 0 && data.scanning) {
        container.innerHTML = '<div class="text-slate-400 text-center py-10">🔄 Scanning for opportunities... Please wait a moment.</div>';
        setTimeout(loadOpportunities, 5000);
        return;
      }
      allOpportunities = data.opportunities || [];
      updateStats(allOpportunities);
      applyFilters();
      document.getElementById('lastScanTime').innerText = data.lastScan ? new Date(data.lastScan).toLocaleTimeString() : '—';
      if (allOpportunities.length === 0 && !data.scanning) {
        container.innerHTML = '<div class="text-slate-400 text-center py-10">No opportunities found. Try refreshing later.</div>';
      }
    } catch (e) {
      container.innerHTML = '<div class="text-slate-400 text-center py-10">Failed to load. <button class="btn btn-secondary mt-2" onclick="loadOpportunities()">Retry</button></div>';
    }
  }

  // ========== APPLY FILTERS ==========
  // ... (same as before) ...

  // ========== OPEN OPPORTUNITY ==========
  async function openOpportunity(id) {
    showPage('details');
    document.getElementById('detailEmpty').style.display = 'none';
    document.getElementById('detailContent').style.display = 'block';
    document.getElementById('detailSymbol').innerText = 'Loading...';
    try {
      const res = await fetch(`/api/opportunity/${id}/details`, { headers: { Authorization: token } });
      if (!res.ok) throw new Error('Failed to load details');
      const opp = await res.json();
      if (opp.error) throw new Error(opp.error);
      currentDetailOpp = opp;
      displayDetails(opp);
      setupExecuteTab(opp);
      // Update Smart Trade Checklist
      updateTradeChecklist(opp);
    } catch (e) {
      showToast('Failed to load details: ' + e.message, 'error');
      document.getElementById('detailSymbol').innerText = 'Error';
    }
  }

  // ========== SMART TRADE CHECKLIST ==========
  function updateTradeChecklist(opp) {
    if (!opp) return;
    const spread = parseFloat(opp.spread) || 0;
    const liquidity = parseFloat(opp.liquidity) || 0;

    // Spread
    document.getElementById('checkSpread').innerHTML = spread >= 0.5
      ? '<span class="status status-pass">✔ PASS</span>'
      : '<span class="status status-fail">✖ FAIL</span>';

    // Liquidity
    document.getElementById('checkLiquidity').innerHTML = liquidity >= 10000
      ? '<span class="status status-pass">✔ PASS</span>'
      : '<span class="status status-fail">✖ FAIL</span>';

    // Withdrawal enabled
    document.getElementById('checkWithdraw').innerHTML = opp.buyWithdraw
      ? '<span class="status status-pass">✔ PASS</span>'
      : '<span class="status status-fail">✖ FAIL</span>';

    // Deposit enabled
    document.getElementById('checkDeposit').innerHTML = opp.sellDeposit
      ? '<span class="status status-pass">✔ PASS</span>'
      : '<span class="status status-fail">✖ FAIL</span>';

    // Matching network (tradable)
    document.getElementById('checkNetwork').innerHTML = opp.tradable
      ? '<span class="status status-pass">✔ PASS</span>'
      : '<span class="status status-fail">✖ FAIL</span>';

    // Transfer fee acceptable (spread > 1%)
    document.getElementById('checkFee').innerHTML = spread > 1
      ? '<span class="status status-pass">✔ PASS</span>'
      : '<span class="status status-warn">⚠ CHECK</span>';

    // Volatility
    const risk = opp.risk || 'medium';
    let volHtml = '';
    if (risk === 'low') volHtml = '<span class="status status-pass">✔ PASS</span>';
    else if (risk === 'medium') volHtml = '<span class="status status-warn">⚠ MEDIUM</span>';
    else volHtml = '<span class="status status-fail">✖ HIGH</span>';
    document.getElementById('checkVolatility').innerHTML = volHtml;

    // AI Recommendation
    const ready = spread >= 0.5 && liquidity >= 10000 && opp.tradable;
    document.getElementById('checkAI').innerHTML = ready
      ? '<span class="status text-green-400 text-xl font-bold">READY TO TRADE</span>'
      : '<span class="status text-red-400 text-xl font-bold">DO NOT TRADE</span>';
  }

  // ========== EXECUTE TRADE (with checklist update on amount change) ==========
  function updateExecPreview() {
    // ... existing preview logic ...
    // Then update checklist
    if (currentDetailOpp) updateTradeChecklist(currentDetailOpp);
  }

  // ========== REST OF SCRIPT (chat, profile, history, settings, etc.) ==========
  // ... (all the previous functions) ...

  // ========== INIT ==========
  if (token) {
    loadProfile();
    loadOpportunities();
    loadMessages();
    renderFeatures();
    loadTradeHistory();
    chatPollInterval = setInterval(() => {
      if (document.getElementById('chat').classList.contains('active')) loadMessages();
    }, 10000);
  } else {
    showLogin();
  }

  setInterval(() => {
    if (document.getElementById('home').classList.contains('active')) loadOpportunities();
  }, 30000);
</script>
</body>
</html>
