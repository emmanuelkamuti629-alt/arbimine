<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArbiMine | Intelligence Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e7eb; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .row-hover:hover { background: rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-6">

    <!-- Header -->
    <header class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-bold text-white tracking-tight">ArbiMine <span class="text-blue-500">Pro</span></h1>
            <p class="text-gray-500">Global Arbitrage Intelligence System</p>
        </div>
        <div id="status" class="text-sm font-mono text-green-500">● System Operational</div>
    </header>

    <!-- Stats Grid -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <div class="glass p-4 rounded-xl">
            <p class="text-gray-400 text-xs">Active Exchanges</p>
            <p class="text-2xl font-bold">15+</p>
        </div>
        <div class="glass p-4 rounded-xl">
            <p class="text-gray-400 text-xs">Live Opportunities</p>
            <p id="opp-count" class="text-2xl font-bold">0</p>
        </div>
        <div class="glass p-4 rounded-xl">
            <p class="text-gray-400 text-xs">Scan Latency</p>
            <p class="text-2xl font-bold"><span id="latency">--</span>ms</p>
        </div>
        <div class="glass p-4 rounded-xl">
            <p class="text-gray-400 text-xs">System Risk</p>
            <p class="text-2xl font-bold text-green-400">Low</p>
        </div>
    </div>

    <!-- Main Table -->
    <div class="glass rounded-xl overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-white/5 uppercase text-[10px] tracking-widest text-gray-400">
                <tr>
                    <th class="p-4">Symbol</th>
                    <th class="p-4">Buy Exchange</th>
                    <th class="p-4">Sell Exchange</th>
                    <th class="p-4">Spread</th>
                    <th class="p-4">Liquidity</th>
                    <th class="p-4">Risk</th>
                </tr>
            </thead>
            <tbody id="opp-body" class="text-sm">
                <!-- Data populated by JS -->
            </tbody>
        </table>
    </div>

    <script>
        async function fetchOpps() {
            const res = await fetch('/api/opportunities');
            const data = await res.json();
            const body = document.getElementById('opp-body');
            document.getElementById('opp-count').innerText = data.count;
            
            body.innerHTML = data.opportunities.map(o => `
                <tr class="border-t border-white/5 row-hover transition-colors">
                    <td class="p-4 font-bold text-blue-400">${o.symbol}</td>
                    <td class="p-4">${o.buyExchange}</td>
                    <td class="p-4">${o.sellExchange}</td>
                    <td class="p-4 text-green-400 font-mono">+${o.spread}%</td>
                    <td class="p-4">$${parseInt(o.liquidity).toLocaleString()}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded-full text-[10px] ${o.risk === 'low' ? 'bg-green-900/30 text-green-400' : 'bg-yellow-900/30 text-yellow-400'}">${o.risk.toUpperCase()}</span></td>
                </tr>
            `).join('');
        }
        setInterval(fetchOpps, 30000);
        fetchOpps();
    </script>
</body>
</html>
